data_sources:
  market_data:
    provider: "akshare"
    enabled: true
    api_key_env: null
    refresh_interval_minutes: 15
    markets:
      - "A-share"
      - "HK"
    default_adjust: "qfq"

  announcement:
    provider: "akshare_disclosure"
    enabled: true
    markets:
      - "A-share"
      - "HK"

  news:
    provider: "rss"
    enabled: true
    sources:
      - name: "caixin"
        url: ""
        weight: 0.9
      - name: "cls"
        url: ""
        weight: 0.8
      - name: "reuters"
        url: ""
        weight: 0.95

  financial_reports:
    provider: "akshare_disclosure"
    enabled: true
    markets:
      - "A-share"
      - "HK"

  policy:
    provider: "policy_rss"
    enabled: false
    keywords:
      - "人工智能"
      - "半导体"
      - "创新药"

  sentiment:
    provider: "custom"
    enabled: false
